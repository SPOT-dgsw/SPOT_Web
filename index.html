<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" sizes="any" href="/spot-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="application-name" content="SPOT" />
    <meta name="description" content="대구소프트웨어마이스터고 방송부 노래 신청 시스템" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SPOT" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />

    <title>SPOT</title>
    <script>
      // SW 캐시 강제 정리 — 버전이 바뀌면 구 SW/캐시를 제거 후 새로고침
      (function(){
        var V='spot_sw_v4';
        if(localStorage.getItem(V))return;
        if(!('serviceWorker' in navigator))return;
        navigator.serviceWorker.getRegistrations().then(function(regs){
          var p=regs.map(function(r){return r.unregister()});
          if('caches' in window){
            caches.keys().then(function(ks){
              ks.forEach(function(k){caches.delete(k)});
            });
          }
          Promise.all(p).then(function(){
            localStorage.setItem(V,'1');
            if(regs.length>0)location.reload();
          });
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
